<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — iOS Knowledge Tree</title>
  <link rel="stylesheet" href="{{root}}assets/style.css">
</head>
<body id="top" class="site-wrapper">

  {{header}}

  <div class="main-layout">
    {{nav}}

    <main class="site-content">
      <h1>{{title}}</h1>
      <p>{{description}}</p>

      <h2>Topics in this section</h2>
      <ul class="topic-list">
        {{topic_links}}
      </ul>
    </main>
  </div>

  {{footer}}

</body>
</html>
